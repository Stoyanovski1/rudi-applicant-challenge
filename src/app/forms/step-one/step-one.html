<div class="stepOneForm">
  <h2 class="textCenter">Personal Information</h2>
  <form [formGroup]="form">

  <div class="nameDiv">
    <label class="paddingRight">First Name <div class="redStar">*</div></label>
    <input formControlName="firstName"> <br>
    <div *ngIf="form.get('firstName')?.touched && form.get('firstName')?.invalid" class="fehlerMeldung">
      (First name is required)
    </div>
    <br>

    <label class="paddingRight">Last Name <div class="redStar">*</div></label>
    <input formControlName="lastName"> <br>
    <div *ngIf="form.get('lastName')?.touched && form.get('lastName')?.invalid" class="fehlerMeldung">
      (Last Name is required)
    </div>
    <br>
  </div>

  <label class="paddingRight">Email <div class="redStar">*</div></label>
  <input formControlName="email" class="emailInput" type="email"> <br>
  <div *ngIf="form.get('email')?.touched && form.get('email')?.invalid" class="fehlerMeldung">
    (Email is required)
  </div>
  <br>

  <button type="button" (click)="next()" [disabled]="form.invalid">
    Next
  </button>

  </form>
</div>
